services:
  poster:
    image: ghcr.io/cosmicpush/threads-api-posting:latest
    pull_policy: always
    container_name: threads-poster
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: Asia/Kolkata
      QUOTES_JSON_PATH: /data/quotes.json
      LOCKFILE_PATH: /var/lock/threads_poster/threads_poster.lock
    volumes:
      # Host directory -> container's /data. Must be a directory (not a single
      # file) so Python's atomic rewrite of quotes.json works — bind-mounting
      # a single file pins the inode and breaks os.replace.
      # Set QUOTES_HOST_DIR in .env, e.g.
      # QUOTES_HOST_DIR=/home/ubuntu/threads-api-posting/data
      # The directory must contain quotes.json and be writable by uid 10001.
      - ${QUOTES_HOST_DIR}:/data
